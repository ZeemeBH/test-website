name: Deploy to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'admin/**'
      - '.github/workflows/deploy-cloudflare.yml'
  workflow_dispatch:

jobs:
  # ── Deploy Worker API ─────────────────────────────────────────────────────
  deploy-worker:
    runs-on: ubuntu-latest
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute pickup-dropoff-db --file=src/db/schema.sql --remote

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

  # ── Deploy Admin Dashboard to GitHub Pages ────────────────────────────────
  deploy-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://pickup-dropoff-api.late-unit-ca39.workers.dev' }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL || 'https://pickup-dropoff-api.late-unit-ca39.workers.dev' }}
          VITE_BASE_PATH: '/test-website/'
        run: npm run build

      - name: Inject runtime ENV into index.html
        run: |
          API_URL="${{ secrets.VITE_API_URL || 'https://pickup-dropoff-api.late-unit-ca39.workers.dev' }}"
          sed -i "s|</head>|<script>window.__ENV__={API_URL:\"${API_URL}\",WS_URL:\"${API_URL}\",MB_TOKEN:\"\"};</script></head>|" dist/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: admin/dist
